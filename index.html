<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎬 نشر مسلسل - نظام ذكي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #1e1e2e;
      --accent: #e50914;
      --accent2: #ff6b35;
      --accent3: #3b82f6;
      --text: #f0f0f0;
      --muted: #666;
      --input-bg: #0d0d14;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .container { width: 100%; max-width: 900px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; }
    .header .logo { font-size: 42px; }
    .header h1 { font-size: 22px; font-weight: 900; }
    .header p { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
      margin-bottom: 20px;
    }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #aaa; margin-bottom: 8px; }
    label span { color: var(--accent); }
    input {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; color: var(--text);
      font-family: 'Cairo', sans-serif; font-size: 14px; outline: none;
    }
    input:focus { border-color: var(--accent); }
    .preview {
      display: none; margin-bottom: 18px; border-radius: 10px;
      overflow: hidden; border: 1px solid var(--border);
      aspect-ratio: 16/9; background: #000;
    }
    .preview img { width: 100%; height: 100%; object-fit: cover; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }
    .btn-primary {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px; color: #fff;
      font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      padding: 8px 16px; background: linear-gradient(135deg, var(--accent3), #1e3a8a);
      border: none; border-radius: 8px; color: #fff;
      font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .btn-retry {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      padding: 6px 12px;
      font-size: 11px;
    }
    .login-btn {
      width: 100%; padding: 12px; background: transparent;
      border: 1px solid var(--border); border-radius: 10px; color: #aaa;
      font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .login-btn.logged { border-color: #22c55e; color: #22c55e; }
    .episodes-table {
      margin-top: 20px;
      overflow-x: auto;
    }
    .episodes-table table {
      width: 100%;
      border-collapse: collapse;
    }
    .episodes-table th, .episodes-table td {
      padding: 12px 8px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .episodes-table th {
      background: var(--input-bg);
      color: var(--accent);
      font-weight: 700;
    }
    .episodes-table td input {
      padding: 8px 10px;
      font-size: 11px;
      direction: ltr;
    }
    .link-cell {
      direction: ltr;
      font-size: 11px;
      word-break: break-all;
      max-width: 250px;
    }
    .link-cell a {
      color: #3b82f6;
      text-decoration: none;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-published { background: rgba(34,197,94,0.2); color: #22c55e; }
    .status-converted { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .status-failed { background: rgba(229,9,20,0.2); color: #f87171; }
    .status-waiting { background: rgba(107,114,128,0.2); color: #9ca3af; }
    .error {
      display: none; margin-top: 16px; padding: 14px;
      background: rgba(229,9,20,0.08); border: 1px solid rgba(229,9,20,0.2);
      border-radius: 10px; font-size: 13px; color: #f87171;
    }
    .progress-container {
      display: none;
      margin-top: 20px;
    }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.3s;
    }
    .progress-text {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .note { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .summary {
      background: rgba(59,130,246,0.1);
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
    }
    .waiting-message {
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.2);
      border-radius: 10px;
      padding: 12px;
      margin: 15px 0;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">📺</div>
    <h1>نشر مسلسل - نظام ذكي</h1>
    <p>يتأكد من quota | ينتظر 15 ثانية كل 5 حلقات</p>
  </div>

  <div class="card">
    <button id="loginBtn" class="login-btn" onclick="doLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      تسجيل الدخول بـ Google
    </button>

    <div class="preview" id="posterPreview">
      <img id="posterImg" src="" alt="بوستر المسلسل">
    </div>

    <div class="field">
      <label>📺 اسم المسلسل <span>*</span></label>
      <input type="text" id="seriesName" placeholder="مثال: Mouse">
    </div>

    <div class="field">
      <label>🖼️ رابط البوستر <span>*</span></label>
      <input type="url" id="posterUrl" placeholder="https://...jpg">
    </div>

    <div class="row">
      <div class="field">
        <label>🔢 عدد الحلقات <span>*</span></label>
        <input type="number" id="episodesCount" placeholder="مثال: 20" min="1" max="100">
      </div>
      <div class="field">
        <label>🔢 ابدأ من حلقة رقم</label>
        <input type="number" id="startFrom" placeholder="1" min="1" value="1">
      </div>
    </div>

    <div class="field">
      <label>▶️ رابط الفيديو الأساسي <span>*</span></label>
      <input type="url" id="baseStreamUrl" placeholder="https://...master.m3u8">
      <div class="note">هيتضاعف تلقائياً (هيضيف ?ep=1, ?ep=2, ...)</div>
    </div>

    <button id="publishBtn" class="btn-primary" onclick="startPublishing()" disabled>🚀 نشر كل الحلقات</button>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>

    <div class="error" id="errorBox"></div>
  </div>

  <!-- جدول الحلقات -->
  <div id="episodesTableContainer" style="display: none;">
    <div class="card">
      <h3 style="margin-bottom: 15px;">📋 قائمة الحلقات</h3>
      <div class="episodes-table">
        <table id="episodesTable">
          <thead>
            <tr>
              <th>#</th>
              <th>العنوان</th>
              <th>الرابط</th>
              <th>رابط التحويل الجديد</th>
              <th>الحالة</th>
            </tr>
          </thead>
          <tbody id="episodesTableBody">
          </tbody>
        </table>
      </div>
      <div class="summary" id="summary"></div>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  var CLIENT_ID  = "632431284451-jfbq5f5ts90lkio34nt5p35f6plnn755.apps.googleusercontent.com";
  var BLOG_ID    = "5055056580470574725";
  var SCOPES     = "https://www.googleapis.com/auth/blogger";
  var accessToken = null;
  var tokenClient = null;
  
  var publishedEpisodes = [];
  var isPublishing = false;

  document.getElementById('posterUrl').addEventListener('input', function() {
    var url = this.value.trim();
    var preview = document.getElementById('posterPreview');
    var img = document.getElementById('posterImg');
    if (url) { img.src = url; preview.style.display = 'block'; }
    else { preview.style.display = 'none'; }
  });

  window.onload = function() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: function(resp) {
        if (resp.error) { showError("فشل تسجيل الدخول: " + resp.error); return; }
        accessToken = resp.access_token;
        var btn = document.getElementById('loginBtn');
        btn.innerHTML = '✅ تم تسجيل الدخول بنجاح';
        btn.classList.add('logged');
        document.getElementById('publishBtn').disabled = false;
      }
    });
  };

  function doLogin() { tokenClient.requestAccessToken(); }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function publishSingleEpisode(episodeNum, seriesName, poster, streamUrl, retryCount) {
    var titleWithoutWord = `${seriesName} - ${episodeNum}`;
    var browserTitle = `🔹${titleWithoutWord}🔹`;
    
    var content = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${browserTitle.replace(/"/g, '\\"')}</title>
  <script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"><\/script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"><\/script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="player"></div>
<script>
  jwplayer("player").setup({
    sources: [{ file: "${streamUrl.replace(/"/g, '\\"')}", label: "Auto" }],
    image: "${poster.replace(/"/g, '\\"')}",
    title: "${browserTitle.replace(/"/g, '\\"')}",
    width: "100%",
    height: "100%",
    stretching: "exactfit",
    duration: "1814400",
    preload: "auto",
    androidhls: true,
    hlshtml: true,
    primary: "html5",
    startparam: "start",
    playbackRateControls: true,
    playbackRates: [0.5, 1, 1.25, 1.5, 2],
    tracks: [],
    cast: {},
    abouttext: "",
    aboutlink: "",
    sharing: { sites: [] }
  });
<\/script>
</body>
</html>`;

    for (let attempt = 1; attempt <= retryCount; attempt++) {
      try {
        var response = await fetch("https://www.googleapis.com/blogger/v3/blogs/" + BLOG_ID + "/posts/", {
          method: "POST",
          headers: { "Authorization": "Bearer " + accessToken, "Content-Type": "application/json" },
          body: JSON.stringify({ title: browserTitle, content: content })
        });
        
        var data = await response.json();
        
        if (data.url) {
          return { success: true, url: data.url, postId: data.id };
        }
        
        // Check for quota error
        if (data.error && (data.error.code === 403 || data.error.message?.includes('quota') || data.error.message?.includes('exhausted'))) {
          if (attempt < retryCount) {
            return { success: false, error: "QUOTA", needWait: true };
          }
        }
        
        if (attempt < retryCount) {
          await sleep(3000);
          continue;
        }
        
        return { success: false, error: data.error?.message || "فشل النشر" };
        
      } catch(err) {
        if (attempt < retryCount) {
          await sleep(3000);
          continue;
        }
        return { success: false, error: err.message };
      }
    }
    
    return { success: false, error: "فشل بعد عدة محاولات" };
  }

  async function startPublishing() {
    if (isPublishing) {
      showError("⚠️ عملية نشر قيد التشغيل بالفعل، انتظر قليلاً");
      return;
    }
    
    var seriesName = document.getElementById('seriesName').value.trim();
    var poster = document.getElementById('posterUrl').value.trim();
    var episodesCount = parseInt(document.getElementById('episodesCount').value);
    var startFrom = parseInt(document.getElementById('startFrom').value) || 1;
    var baseStreamUrl = document.getElementById('baseStreamUrl').value.trim();
    
    hideError();
    if (!seriesName) { showError("⚠️ اكتب اسم المسلسل"); return; }
    if (!poster) { showError("⚠️ حط رابط البوستر"); return; }
    if (!episodesCount || episodesCount < 1) { showError("⚠️ اكتب عدد الحلقات"); return; }
    if (!baseStreamUrl) { showError("⚠️ حط رابط الفيديو الأساسي"); return; }
    if (!accessToken) { showError("⚠️ سجّل الدخول الأول"); return; }

    isPublishing = true;
    var btn = document.getElementById('publishBtn');
    btn.disabled = true;
    btn.textContent = '⏳ جاري النشر...';
    
    var progressContainer = document.getElementById('progressContainer');
    var progressFill = document.getElementById('progressFill');
    var progressText = document.getElementById('progressText');
    progressContainer.style.display = 'block';
    
    publishedEpisodes = [];
    var successCount = 0;
    var failCount = 0;
    var total = episodesCount;
    var consecutiveSuccess = 0;

    for (var i = 0; i < total; i++) {
      var episodeNum = startFrom + i;
      var streamUrl = baseStreamUrl + (baseStreamUrl.includes('?') ? '&ep=' : '?ep=') + episodeNum;
      
      var percent = ((i + 1) / total * 100).toFixed(1);
      progressFill.style.width = percent + '%';
      progressText.textContent = `جاري نشر الحلقة ${episodeNum}... (${percent}%)`;
      
      var result = await publishSingleEpisode(episodeNum, seriesName, poster, streamUrl, 3);
      
      if (result.success) {
        publishedEpisodes.push({
          num: episodeNum,
          title: `${seriesName} - ${episodeNum}`,
          url: result.url,
          postId: result.postId,
          converted: false,
          redirectUrl: "",
          status: "published"
        });
        successCount++;
        consecutiveSuccess++;
        progressText.textContent = `✅ تم نشر الحلقة ${episodeNum} (${successCount}/${total - failCount})`;
        
        // بعد كل 5 حلقات ناجحة، ننتظر 15 ثانية
        if (consecutiveSuccess === 5 && i < total - 1) {
          progressText.textContent = `⏳ تم نشر 5 حلقات، ننتظر 15 ثانية قبل المتابعة...`;
          showError("⏳ تم نشر 5 حلقات، ننتظر 15 ثانية عشان quota...");
          await sleep(15000);
          hideError();
          consecutiveSuccess = 0;
        }
      } else {
        if (result.error === "QUOTA") {
          progressText.textContent = `⚠️ مشكلة في سيرفر جوجل (quota)، ننتظر 20 ثانية ثم نكمل...`;
          showError("⚠️ جوجل طلب انتظار مؤقت، ننتظر 20 ثانية...");
          await sleep(20000);
          hideError();
          // نعيد المحاولة للحلقة نفسها
          i--;
          continue;
        }
        
        publishedEpisodes.push({
          num: episodeNum,
          title: `${seriesName} - ${episodeNum}`,
          url: null,
          postId: null,
          error: result.error,
          status: "failed",
          converted: false,
          streamUrl: streamUrl
        });
        failCount++;
        consecutiveSuccess = 0;
        progressText.textContent = `❌ فشلت الحلقة ${episodeNum}: ${result.error.substring(0, 50)}`;
      }
      
      // تأخير بسيط بين الحلقات (ثانيتين)
      if (i < total - 1 && !result.error === "QUOTA") {
        await sleep(2000);
      }
    }
    
    progressContainer.style.display = 'none';
    btn.disabled = false;
    btn.textContent = '🚀 نشر كل الحلقات';
    isPublishing = false;
    
    showEpisodesTable();
    showError(`✅ اكتمل: ${successCount} حلقة ناجحة / ${failCount} فشل`);
    if (failCount > 0) {
      showError(`⚠️ فشل ${failCount} حلقة. استخدم زر "إعادة نشر" في الجدول`);
    }
    setTimeout(() => hideError(), 5000);
  }

  async function retryEpisode(episodeNum) {
    var episode = publishedEpisodes.find(function(e) { return e.num === episodeNum; });
    if (!episode) return;
    
    var seriesName = document.getElementById('seriesName').value.trim();
    var poster = document.getElementById('posterUrl').value.trim();
    
    var btn = document.querySelector(`#retry_${episodeNum}`);
    var originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '⏳...';
    
    var streamUrl = episode.streamUrl || (document.getElementById('baseStreamUrl').value.trim() + 
      (document.getElementById('baseStreamUrl').value.trim().includes('?') ? '&ep=' : '?ep=') + episodeNum);
    
    var result = await publishSingleEpisode(episodeNum, seriesName, poster, streamUrl, 3);
    
    if (result.success) {
      episode.url = result.url;
      episode.postId = result.postId;
      episode.status = "published";
      episode.error = null;
      showEpisodesTable();
      showError(`✅ تم نشر الحلقة ${episodeNum} بنجاح!`);
      setTimeout(() => hideError(), 3000);
    } else {
      showError(`❌ فشلت إعادة نشر الحلقة ${episodeNum}: ${result.error}`);
    }
    
    btn.disabled = false;
    btn.textContent = originalText;
  }

  function showEpisodesTable() {
    var container = document.getElementById('episodesTableContainer');
    var tbody = document.getElementById('episodesTableBody');
    var summary = document.getElementById('summary');
    
    tbody.innerHTML = '';
    var convertedCount = 0;
    var publishedCount = 0;
    
    publishedEpisodes.forEach(function(ep) {
      var row = tbody.insertRow();
      
      var cellNum = row.insertCell(0);
      cellNum.innerHTML = `<strong>${ep.num}</strong>`;
      
      var cellTitle = row.insertCell(1);
      cellTitle.innerHTML = ep.title;
      cellTitle.style.textAlign = 'right';
      
      var cellLink = row.insertCell(2);
      if (ep.url) {
        cellLink.innerHTML = `<a href="${ep.url}" target="_blank" class="link-cell">${ep.url.substring(0, 40)}...</a>`;
        cellLink.className = 'link-cell';
        publishedCount++;
      } else {
        cellLink.innerHTML = `<span style="color:#f87171; font-size:11px;">${ep.error || 'فشل'}</span>
                              <div style="margin-top:5px;"><button id="retry_${ep.num}" class="btn-secondary btn-retry" onclick="retryEpisode(${ep.num})">🔄 إعادة نشر</button></div>`;
      }
      
      var cellConvert = row.insertCell(3);
      var inputId = `redirect_${ep.num}`;
      if (ep.url) {
        cellConvert.innerHTML = `
          <div style="display: flex; gap: 6px;">
            <input type="url" id="${inputId}" placeholder="https://vipserver.../embed-xxx.html" style="flex:1; font-size:11px;">
            <button class="btn-secondary" onclick="convertEpisode(${ep.num}, '${inputId}')" style="padding:6px 12px;">تحويل</button>
          </div>
        `;
      } else {
        cellConvert.innerHTML = `<span style="color:#666; font-size:11px;">يجب نشر الحلقة أولاً</span>`;
      }
      
      var cellStatus = row.insertCell(4);
      if (ep.converted) {
        cellStatus.innerHTML = '<span class="status-badge status-converted">🔄 تم التحويل</span>';
        convertedCount++;
      } else if (ep.url) {
        cellStatus.innerHTML = '<span class="status-badge status-published">✅ منشور</span>';
      } else {
        cellStatus.innerHTML = '<span class="status-badge status-failed">❌ فشل</span>';
      }
    });
    
    summary.innerHTML = `
      📊 <strong>الخلاصة:</strong> ${publishedEpisodes.length} حلقة | 
      ✅ منشور: ${publishedCount} | 
      🔄 تم التحويل: ${convertedCount}
    `;
    
    container.style.display = 'block';
  }

  async function convertEpisode(episodeNum, inputId) {
    var redirectUrl = document.getElementById(inputId).value.trim();
    if (!redirectUrl) {
      showError(`⚠️ ادخل رابط التحويل للحلقة ${episodeNum}`);
      return;
    }
    if (!accessToken) {
      showError("⚠️ سجّل الدخول الأول");
      return;
    }
    
    var episode = publishedEpisodes.find(function(e) { return e.num === episodeNum; });
    if (!episode || !episode.postId) {
      showError(`⚠️ الحلقة ${episodeNum} مش موجودة أو فشل نشرها`);
      return;
    }
    
    var btn = document.querySelector(`#redirect_${episodeNum}`).nextElementSibling;
    var originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '⏳...';
    
    try {
      var newContent = generateRedirectContent(episode.title, redirectUrl);
      
      let updateRes = await fetch(`https://www.googleapis.com/blogger/v3/blogs/${BLOG_ID}/posts/${episode.postId}`, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + accessToken, "Content-Type": "application/json" },
        body: JSON.stringify({ title: `🔹${episode.title}🔹`, content: newContent })
      });
      
      let result = await updateRes.json();
      
      if (result.url) {
        episode.converted = true;
        episode.redirectUrl = redirectUrl;
        showEpisodesTable();
        showError(`✅ تم تحويل الحلقة ${episodeNum} إلى ${redirectUrl}`);
        setTimeout(() => hideError(), 3000);
      } else {
        showError(`⚠️ فشل التحويل: ${result.error?.message || 'خطأ غير معروف'}`);
      }
    } catch(err) {
      showError(`⚠️ ${err.message}`);
    }
    
    btn.disabled = false;
    btn.textContent = originalText;
  }

  function generateRedirectContent(title, redirectUrl) {
    return `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔹${title.replace(/"/g, '\\"')}🔹</title>
  <meta http-equiv="refresh" content="4;url=${redirectUrl.replace(/"/g, '\\"')}">
  <style>
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Cairo', sans-serif; color: white; }
    .loading { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #e50914; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <p>جاري التحويل إلى المشغل ...</p>
  <p style="font-size:12px;color:#666;">سيتم التحويل تلقائياً خلال 4 ثوانٍ</p>
</div>
</body>
</html>`;
  }

  function showError(msg) {
    var el = document.getElementById('errorBox');
    el.textContent = msg;
    el.style.display = 'block';
  }
  
  function hideError() {
    document.getElementById('errorBox').style.display = 'none';
  }
</script>
</body>
</html>
